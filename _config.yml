# ------------------------------------------------------------
# Site Identity
# ------------------------------------------------------------
title: "The People's Ledger"
email:
description: >-
  A civic newsroom dedicated to evidence, accountability, and public power.
url: "https://thepeoplesledger-oss.github.io"
baseurl: ""   # IMPORTANT: must be empty for user/org sites

twitter_username:
github_username: thepeoplesledger-oss
minimal_mistakes_skin: default
search: true

# ------------------------------------------------------------
# Navigation
# ------------------------------------------------------------
navigation:
  - title: "Home"
    url: "/"
  - title: "About"
    url: "/about/"
  - title: "Ledger File"
    url: "/ledger-file/"
  - title: "People’s Brief"
    url: "/peoples-brief/"
  - title: "Investigations"
    url: "/investigations/"
  - title: "Editorials"
    url: "/editorials/"
  - title: "Projects"
    url: "/projects/"

# ------------------------------------------------------------
# Theme
# ------------------------------------------------------------
remote_theme: "mmistakes/minimal-mistakes"

# ------------------------------------------------------------
# Defaults (REQUIRED for Minimal Mistakes)
# ------------------------------------------------------------
defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      nav: true
      author_profile: false
      read_time: true
      comments: true
      share: true
      related: true

  # Pages (all standalone pages)
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

  # Homepage
  - scope:
      path: ""
      type: home
    values:
      layout: home
      author_profile: false

# ------------------------------------------------------------
# Homepage Settings (optional)
# ------------------------------------------------------------
home:
  layout: home
  nav: true

# ------------------------------------------------------------
# Build Settings
# ------------------------------------------------------------
markdown: kramdown

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone:

include:
  - _pages

# ------------------------------------------------------------
# Plugins
# ------------------------------------------------------------
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# ------------------------------------------------------------
# Author Profile
# ------------------------------------------------------------
author:
  name: "Lisa Squire"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "Founder of The People’s Ledger — a civic newsroom for evidence, accountability, and public power."
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://thepeoplesledger.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/thepeoplesledger-oss"

# ------------------------------------------------------------
# Footer Links
# ------------------------------------------------------------
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/thepeoplesledger-oss"
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://thepeoplesledger.com"

# ------------------------------------------------------------
# Archives
# ------------------------------------------------------------
category_archive:
  enabled: false

tag_archive:
  type: liquid
  path: /tags/
