# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: "The People's Ledger"
email:
description: >-
  A civic newsroom dedicated to evidence, accountability, and public power.
twitter_username:
github_username: thepeoplesledger-oss
minimal_mistakes_skin: default
search: true

navigation:
  - title: "Ledger File"
    url: /ledger-file/
  - title: "People’s Brief"
    url: /peoples-brief/
  - title: "Investigations"
    url: /investigations/
  - title: "Editorials"
    url: /editorials/
  - title: "About"
    url: /about/
# Homepage settings
home:
  layout: home
  nav: true
# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name    : "Lisa Squire"
  avatar  : "/assets/images/bio-photo.jpg"
  bio     : "Founder of The People’s Ledger — a civic newsroom for evidence, accountability, and public power."
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://thepeoplesledger.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/thepeoplesledger-oss"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/thepeoplesledger-oss"
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://thepeoplesledger.com"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      nav: true
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
    # homepage
  - scope:
      path: ""
      type: home
    values:
      layout: home
      nav: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
